<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 2 Chapter 24</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/DCC_2_24_sky.webp" class="layer sky " alt="Sky">

        <canvas id="stars-canvas" class="layer stars" data-star-count="250"></canvas>

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/DCC_2_24_background.webp" class="layer background parallax-bg" alt="Background">
            <img src="../Images/DCC_2_24_midground.webp" class="layer midground parallax-mg" alt="Midground">

            <img src="../Images/DCC_2_24_foreground.webp" class="layer foreground"  alt="Foreground">

            <img src="../Images/DCC_2_24_remex.webp"
                 class="layer remex breathe"
                 style="z-index: 80; --breathe-duration: 7s; --breathe-delay: -1s;"
                 alt="Remex">

            <img src="../Images/DCC_2_24_gem_low.webp"  class="layer gem-low"  style="z-index: 90;" alt="Gem Low">

            <img src="../Images/DCC_2_24_gem_high.webp"
                 class="layer gem-high pulse"
                 style="z-index: 91; --pulse-duration: 9s; --pulse-delay: 0s;"
                 alt="Gem High">

            <canvas id="dust-canvas" class="layer dust"
                    style="z-index: 100;"
                    data-spot-color="255,140,0"
                    data-spot-x="0.66"
                    data-spot-y="0.5"
                    data-enable-glow="true">
            </canvas>

            <img src="../Images/DCC_2_24_donut.webp"
                 class="layer donut breathe"
                 style="z-index: 93; --breathe-duration: 6s; --breathe-delay: -2s;"
                 alt="Donut">
            <img src="../Images/DCC_2_24_carl.webp"
                 class="layer carl breathe"
                 style="z-index: 94;"
                 alt="Carl">

        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/stars.js"></script>
    <script src="../js/dust.js"></script>
</body>
</html>
