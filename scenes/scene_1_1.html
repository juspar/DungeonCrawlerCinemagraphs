<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 1 Chapter 1</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_1_1/DCC_1_1_sky.webp" class="layer sky parallax-static" alt="Sky">

        <canvas id="stars-canvas" class="layer stars parallax-static" data-star-count="550"></canvas>

        <img src="../Images/scene_1_1/DCC_1_1_sea.webp" class="layer sea parallax-static" style="z-index: 10;" alt="Sea">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_1_1/DCC_1_1_background.webp" class="layer background parallax-bg" alt="Background">

            <img src="../Images/scene_1_1/DCC_1_1_midground.webp" class="layer midground parallax-mid" alt="Midground">

            <img src="../Images/scene_1_1/DCC_1_1_light_low.webp" class="layer light parallax-mid" style="z-index: 45" alt="Light">
            
            <div class="layer parallax-mid" style="z-index: 46;">
                <img src="../Images/scene_1_1/DCC_1_1_light_high.webp"
                     class="layer light pulse"
                     style="--pulse-duration: 10s;"
                     alt="Light">
            </div>

            <img src="../Images/scene_1_1/DCC_1_1_foreground.webp" class="layer foreground parallax-fg" alt="Foreground">

            <img src="../Images/scene_1_1/DCC_1_1_carl.webp" class="layer subject breathe parallax-fg" style="z-index: 80;" alt="Carl">

            <canvas id="snow-canvas" class="layer snow parallax-fg" style="z-index: 100;"></canvas>
        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/stars.js"></script>
    <script src="../js/snow.js"></script>
</body>
</html>
