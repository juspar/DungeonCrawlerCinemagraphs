<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 1 Chapter 28</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_1_28/DCC_1_28_base.webp" class="layer outside ocean-pitch ripple-effect parallax-static" alt="Outside Moon Ocean">
        
        <!-- Camera effected layers -->
        <div class="parallax-camera boat-camera">
            <img src="../Images/scene_1_28/DCC_1_28_background.webp" class="layer background-28 parallax-bg" style="z-index: 20;" alt="Background">

            <img src="../Images/scene_1_28/DCC_1_28_midground.webp" class="layer midground-28 parallax-mid" style="z-index: 40;" alt="Midground">

            <canvas id="sparkle-canvas" class="layer sparkle-layer parallax-fg" style="z-index: 75;" data-origin-x="0.605" data-origin-y="0.16"></canvas>

            <img src="../Images/scene_1_28/DCC_1_28_lexis.webp"
                 class="layer lexis breathe parallax-fg"
                 style="z-index: 70; --breathe-duration: 7s; --breathe-delay: -3s;"
                 alt="Lexis">
            <img src="../Images/scene_1_28/DCC_1_28_carl.webp"
                 class="layer carl breathe parallax-fg"
                 style="z-index: 80;"
                 alt="Carl">
        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/sparkle.js"></script>
</body>
</html>
