<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 5 Chapter 65</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_5_65/DCC_5_65_base.webp" class="layer sky parallax-static" alt="Sky">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_5_65/DCC_5_65_background.webp" class="layer background parallax-bg" alt="Background">

            <img src="../Images/scene_5_65/DCC_5_65_midground.webp" class="layer midground parallax-mid" alt="Midground">

            <canvas 
                id="sparkle-canvas" 
                class="layer sparkle-layer parallax-mid" 
                style="z-index: 48;" 
                data-spot-color="180,62,189"
                data-depth="0.3"
                data-origin-x="0.782" 
                data-origin-y="0.687">
            </canvas>
            <img src="../Images/scene_5_65/DCC_5_65_tina.webp" class="layer tina parallax-mid" style="z-index: 50;" alt="Tina"> 
        
            <img src="../Images/scene_5_65/DCC_5_65_foreground.webp" class="layer foreground parallax-fg" alt="Foreground">

            <img src="../Images/scene_5_65/DCC_5_65_carl.webp"
                class="layer carl breathe parallax-fg"
                style="z-index: 80; --breathe-duration: 8s; --breathe-delay: -0s;"
                alt="Carl"> 
            <img src="../Images/scene_5_65/DCC_5_65_donut.webp"
                 class="layer donut breathe parallax-fg"
                 style="z-index: 82; --breathe-duration: 5s;"
                 alt="Donut">"> 

            <canvas id="dust-canvas" class="layer dust parallax-mid"
                style="z-index: 95;"
                data-spot-color="255,255,255">
            </canvas>
        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/dust.js"></script>
    <script src="../js/sparkle.js"></script>
    
</body>
</html>
