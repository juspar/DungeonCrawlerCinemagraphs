<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 5 Epilogue</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">

        <!-- Background: Sibling of the camera, NOT inside it. Has its own direct zoom animation
             so its scale isn't compounded with the camera's. -->
        <img src="../Images/scene_5_e/DCC_5_e_background.webp" class="layer background zoom-bg-direct" style="z-index: 11;" alt="Background">

        <div class="parallax-camera-zoom">

            <div class="gate-glow hero-glow pulse-glow" style="z-index: 25; left: 50%; top: 50%; --glow-duration: 5s;"></div>
            
            <div class="zoom-fit-characters">
                <img src="../Images/scene_5_e/DCC_5_e_pony.webp" 
                     class="layer breathe" 
                     style="z-index: 30; transform-origin: center center; --breathe-duration: 6.5s; --breathe-delay: -1s;" 
                     alt="Pony">
                
                <img src="../Images/scene_5_e/DCC_5_e_donut.webp" 
                     class="layer breathe" 
                     style="z-index: 31; transform-origin: center center; --breathe-duration: 5s; --breathe-delay: -2s;" 
                     alt="Donut">
                
                <img src="../Images/scene_5_e/DCC_5_e_carl.webp" 
                     class="layer breathe" 
                     style="z-index: 32; transform-origin: center center; --breathe-duration: 8s; --breathe-delay: 0s;" 
                     alt="Carl">
            </div>

            <!-- Gates sitting BEHIND the midground (monolith structure) -->
            <div class="gate-glow pulse-glow" style="z-index: 35; left: 47.42%; top: 41.21%; --glow-scale: 0.75; --glow-opacity: 0.70; --glow-duration: 8s; --glow-delay: -3.0s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 35; left: 53.85%; top: 35.22%; --glow-scale: 0.75; --glow-opacity: 0.45; --glow-duration: 6.2s; --glow-delay: -3.5s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 35; left: 44.08%; top: 28.97%; --glow-scale: 0.75; --glow-opacity: 0.03; --glow-duration: 8.5s; --glow-delay: -4.0s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 35; left: 53.60%; top: 24.35%; --glow-scale: 0.75; --glow-opacity: 0.02; --glow-duration: 6.8s; --glow-delay: -4.5s;"></div>

            <img src="../Images/scene_5_e/DCC_5_e_midground.webp" class="layer midground" alt="Monolith Structure">
            
            <!-- Gates sitting IN FRONT of the midground (monolith structure) -->
            <div class="gate-glow pulse-glow" style="z-index: 41; left: 55.30%; top: 41.86%; --glow-scale: 0.75; --glow-opacity: 0.80; --glow-duration: 6s; --glow-delay: -0.5s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 41; left: 46.62%; top: 37.89%; --glow-scale: 0.75; --glow-opacity: 0.55; --glow-duration: 7s; --glow-delay: -1.0s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 41; left: 51.27%; top: 34.83%; --glow-scale: 0.75; --glow-opacity: 0.30; --glow-duration: 6.5s; --glow-delay: -1.5s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 41; left: 56.39%; top: 29.49%; --glow-scale: 0.75; --glow-opacity: 0.15; --glow-duration: 5.5s; --glow-delay: -2.0s;"></div>
            <div class="gate-glow pulse-glow" style="z-index: 41; left: 44.15%; top: 29.49%; --glow-scale: 0.75; --glow-opacity: 0.08; --glow-duration: 7.5s; --glow-delay: -2.5s;"></div>

            <img src="../Images/scene_5_e/DCC_5_e_midground_reflection.webp" 
                 class="layer glass-reflection-zoom" 
                 style="z-index: 45;" 
                 alt="Glass Reflection">
         
        </div>
    </div>
</body>
</html>
