<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 4 Chapter 33</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_4_33/DCC_4_33_base.webp" class="layer base parallax-static" alt="Sky">
        <img src="../Images/scene_4_33/DCC_4_33_bubbles1.webp" class="layer Bubble1 parallax-static" style="z-index: 5;" alt="Bubble World Layer 1">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_4_33/DCC_4_33_bubbles2.webp" class="layer Bubble2 parallax-fg" style="z-index: 15;" alt="Bubble World Layer 2">
            <img src="../Images/scene_4_33/DCC_4_33_bubbles3.webp" class="layer Bubble3 parallax-fg" style="z-index: 25;" alt="Bubble World Layer 3">
            <img src="../Images/scene_4_33/DCC_4_33_bubbles4.webp" class="layer Bubble4 parallax-mid" style="z-index: 35;" alt="Bubble World Layer 4">
            <img src="../Images/scene_4_33/DCC_4_33_bubbles5.webp" class="layer Bubble5 parallax-mid" style="z-index: 45;" alt="Bubble World Layer 5">
            <img src="../Images/scene_4_33/DCC_4_33_bubbles6.webp" class="layer Bubble6 parallax-fg" style="z-index: 55;" alt="Bubble World Layer 6">
            
            <img src="../Images/scene_4_33/DCC_4_33_foreground.webp" class="layer foreground parallax-fg" alt="Foreground">

            <img src="../Images/scene_4_33/DCC_4_33_carl.webp"
                 class="layer carl breathe parallax-fg"
                 style="z-index: 80; --breathe-duration: 8s; --breathe-delay: -0s;"
                 alt="Carl">
                 
            <img src="../Images/scene_4_33/DCC_4_33_donut.webp"
                 class="layer donut breathe parallax-fg"
                 style="z-index: 81; --breathe-duration: 5s; --breathe-delay: -2s;"
                 alt="Donut">
        </div>
    </div>

    <!-- Physics Engines -->
     
</body>
</html>
