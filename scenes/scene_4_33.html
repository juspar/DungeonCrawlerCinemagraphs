<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 4 Chapter 33</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_4_33/DCC_4_33_base.webp" class="layer base parallax-static" alt="Base layer">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_4_33/DCC_4_33_background.webp" class="layer background parallax-bg" alt="Background">            
            <img src="../Images/scene_4_33/DCC_4_33_midground.webp" class="layer midground parallax-mid" alt="Midground">
            <img src="../Images/scene_4_33/DCC_4_33_foreground.webp" class="layer foreground parallax-fg" alt="Foreground">

            <img src="../Images/scene_4_33/DCC_4_33_carl.webp"
                 class="layer carl breathe parallax-fg"
                 style="z-index: 80; --breathe-duration: 8s; --breathe-delay: -0s;"
                 alt="Carl">
                 
            <img src="../Images/scene_4_33/DCC_4_33_donut.webp"
                 class="layer donut breathe parallax-fg"
                 style="z-index: 81; --breathe-duration: 5s; --breathe-delay: -2s;"
                 alt="Donut">
        </div>
    </div>

    <!-- Physics Engines -->
     
</body>
</html>
