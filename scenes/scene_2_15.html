<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 2 Chapter 15</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_2_15/DCC_2_15_base.webp" class="layer base parallax-static" alt="Base">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_2_15/DCC_2_15_background.webp" class="layer background parallax-bg" alt="Background">

            <img src="../Images/scene_2_15/DCC_2_15_signs_low.webp" class="layer signs-low parallax-bg" style="z-index: 22" alt="Signs Low">
            <div class="layer parallax-bg" style="z-index: 24;">
                <img src="../Images/scene_2_15/DCC_2_15_signs_high.webp"
                     class="layer signs-high pulse"
                     style="--pulse-duration: 5s; --pulse-delay: 0s;"
                     alt="Signs High">
            </div>

            <!-- Dancers -->
            <img src="../Images/scene_2_15/DCC_2_15_dancers1.webp" class="layer dancers-1 parallax-mid" style="z-index: 30;" alt="Dancers 1">
            <img src="../Images/scene_2_15/DCC_2_15_dancers2.webp" class="layer dancers-2 parallax-mid" style="z-index: 31;" alt="Dancers 2">
            <img src="../Images/scene_2_15/DCC_2_15_dancers3.webp" class="layer dancers-3 parallax-mid" style="z-index: 32;" alt="Dancers 3">

            <img src="../Images/scene_2_15/DCC_2_15_midground.webp" class="layer midground parallax-mid" alt="Midground">

            <img src="../Images/scene_2_15/DCC_2_15_carl.webp" class="layer carl breathe parallax-fg"
                 style="z-index: 45; --breathe-duration: 8s; --breathe-delay: -0s;"
                 alt="Carl"> 

            <img src="../Images/scene_2_15/DCC_2_15_foreground.webp" class="layer foreground parallax-fg" alt="Foreground">

            <img src="../Images/scene_2_15/DCC_2_15_donut.webp" class="layer donut breathe parallax-fg"
                 style="z-index: 90; --breathe-duration: 5s; --breathe-delay: -2s;"
                 alt="Donut"> 

            <canvas id="disco-canvas" class="layer disco-layer parallax-fg" style="z-index: 105;"></canvas>

        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/disco.js"></script>
</body>
</html>
