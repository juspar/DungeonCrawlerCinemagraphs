<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 6 Chapter 10</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_6_10/DCC_6_10_base.webp" class="layer base parallax-static" alt="Sky">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_6_10/DCC_6_10_background.webp" class="layer background parallax-bg" alt="Background">
            <canvas id="fire-canvas" 
                class="layer fire parallax-bg" 
                style="z-index: 25;" 
                data-size-multiplier="2.5" 
                data-fire-x="0.5" 
                data-fire-y="0.60" 
                data-fire-hue="290">
            </canvas>

            <img src="../Images/scene_6_10/DCC_6_10_midground.webp" class="layer midground parallax-mid" alt="Midground">

            <img src="../Images/scene_6_10/DCC_6_10_foreground.webp" class="layer foreground parallax-fg" alt="Foreground">

            <canvas class="layer steam"
                    style="z-index: 65;"
                    data-color="175,175,95"
                    data-opacity="0.12"
                    data-origin-x-min="0.0"
                    data-origin-x-max="1.0"
                    data-origin-y-min="0.5"
                    data-origin-y-max="0.9"
                    data-vel-x="-0.005"
                    data-vel-x-rand="0.01"
                    data-vel-y="-0.001"
                    data-vel-y-rand="0.002"
                    data-spawn-rate="0.25"
                    data-life-min="8.0"
                    data-life-max="12.0"
                    data-size-min="0.10"
                    data-size-max="0.20"
                    data-prewarm="15.0">
            </canvas>
            <img src="../Images/scene_6_10/DCC_6_10_foreground_gate.webp" class="layer gate parallax-fg" style="z-index: 70;" alt="Gate">

            <img src="../Images/scene_6_10/DCC_6_10_donut.webp"
                 class="layer donut breath e parallax-fg"
                 style="z-index: 81; --breathe-duration: 6s;"
                 alt="Donut">

            <img src="../Images/scene_6_10/DCC_6_10_carl.webp"
                 class="layer carl breath e parallax-fg"
                 style="z-index: 80; --breathe-duration: 8s;"
                 alt="Carl">

        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/steam.js"></script>
    <script src="../js/fire.js"></script>
</body>
</html>
