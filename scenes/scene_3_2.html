<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Book 3 Chapter 2</title>
    <link rel="stylesheet" href="../css/scene.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <a href="../index.html" class="back-button" id="back-btn">⬅ Back</a>
    <script>
        if (window !== window.parent) {
            document.getElementById('back-btn').style.display = 'none';
        }
    </script>
    
    <div class="scene-container">
        <!-- Static deep background elements -->
        <img src="../Images/scene_3_2/DCC_3_2_base.webp" class="layer base parallax-static" alt="Base">

        <!-- Camera effected layers -->
        <div class="parallax-camera">
            <img src="../Images/scene_3_2/DCC_3_2_background.webp" class="layer background parallax-bg" alt="Background">
            <img src="../Images/scene_3_2/DCC_3_2_midground.webp" class="layer midground parallax-mid" alt="Midground">

            <img src="../Images/scene_3_2/DCC_3_2_carl.webp"
                 class="layer carl breathe parallax-fg"
                 style="z-index: 50; --breathe-duration: 6s; --breathe-delay: -2s;"
                 alt="Carl">

            <img src="../Images/scene_3_2/DCC_3_2_katia.webp"
                 class="layer katia breathe parallax-fg"
                 style="z-index: 51;"
                 alt="katia">

            <img src="../Images/scene_3_2/DCC_3_2_foreground.webp" class="layer foreground parallax-fg"  alt="Foreground">

            <canvas id="dust-canvas" class="layer dust parallax-fg"
                    style="z-index: 100;"
                    data-spot-color="255,255,255">
            </canvas>
        </div>
    </div>

    <!-- Physics Engines -->
    <script src="../js/dust.js"></script>
</body>
</html>
